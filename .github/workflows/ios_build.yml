name: iOS Build & TestFlight

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  BUNDLE_ID: com.yousef.ctds
  TEAM_ID: B4S7M6N5U5

jobs:
  build:
    name: Build iOS IPA
    runs-on: macos-15
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Diagnostics
        run: |
          xcodebuild -version
          xcodebuild -showsdks

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5' # Matched to local environment
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze code
        run: flutter analyze

      - name: Run tests
        run: flutter test

      - name: Install Apple Certificate and Provisioning Profile
        if: github.event_name != 'pull_request' && env.HAS_SECRETS == 'true'
        env:
          P12_BASE64: ${{ secrets.P12_BASE64 }}
          MOBILEPROVISION_BASE64: ${{ secrets.MOBILEPROVISION_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          # create variables
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          # import certificate and provisioning profile from secrets
          echo -n "$P12_BASE64" | base64 --decode -o $CERTIFICATE_PATH
          echo -n "$MOBILEPROVISION_BASE64" | base64 --decode -o $PP_PATH

          # create temporary keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          # import certificate to keychain
          security import $CERTIFICATE_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

          # apply provisioning profile
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles

          PROFILE_NAME="$(security cms -D -i "$PP_PATH" | plutil -extract Name raw -)"
          echo "profile_name=$PROFILE_NAME" >> "$GITHUB_ENV"

      - name: Pre-install CocoaPods
        if: github.event_name != 'pull_request' && env.HAS_SECRETS == 'true'
        run: |
          cd ios
          for i in 1 2 3; do pod repo update && break || sleep 5; done
          for i in 1 2 3; do pod install && break || sleep 5; done

      - name: Update Xcode project with Provisioning Profile
        if: github.event_name != 'pull_request' && env.HAS_SECRETS == 'true'
        run: |
          PBXPROJ_PATH="ios/Runner.xcodeproj/project.pbxproj"
          TEAM_ID="${{ env.TEAM_ID }}"
          PROFILE_NAME="${{ env.profile_name }}"
          
          echo "Aggressively updating $PBXPROJ_PATH with Profile: $PROFILE_NAME"
          
          # 1. Inject settings into ALL buildSettings blocks
          sed -i '' 's/buildSettings = {/buildSettings = {\n\t\t\t\tPROVISIONING_PROFILE_SPECIFIER = "'"$PROFILE_NAME"'";\n\t\t\t\tCODE_SIGN_IDENTITY = "Apple Distribution";\n\t\t\t\tCODE_SIGN_STYLE = Manual;\n\t\t\t\tProvisioningStyle = Manual;/g' "$PBXPROJ_PATH"
          
          # 2. Force DEVELOPMENT_TEAM to match our env
          sed -i '' "s/DEVELOPMENT_TEAM = [^;]*;/DEVELOPMENT_TEAM = $TEAM_ID;/g" "$PBXPROJ_PATH"
          
          # 3. Ensure ProvisioningStyle is Manual everywhere
          sed -i '' "s/ProvisioningStyle = Automatic;/ProvisioningStyle = Manual;/g" "$PBXPROJ_PATH"

      - name: Create ExportOptions.plist
        if: github.event_name != 'pull_request' && env.HAS_SECRETS == 'true'
        run: |
          mkdir -p ios/Runner
          cat > ios/Runner/ExportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>teamID</key>
            <string>${{ env.TEAM_ID }}</string>
            <key>uploadSymbols</key>
            <true/>
            <key>uploadBitcode</key>
            <false/>
            <key>compileBitcode</key>
            <false/>
            <key>manageAppVersionAndBuildNumber</key>
            <true/>
            <key>signingStyle</key>
            <string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>${{ env.BUNDLE_ID }}</key>
              <string>${{ env.profile_name }}</string>
            </dict>
          </dict>
          </plist>
          EOF

      - name: Build IPA
        if: github.event_name != 'pull_request' && env.HAS_SECRETS == 'true'
        run: flutter build ipa --release --export-options-plist=ios/Runner/ExportOptions.plist

      - name: Upload to TestFlight
        if: github.event_name != 'pull_request' && env.HAS_SECRETS == 'true'
        env:
          APP_STORE_CONNECT_API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_API_ISSUER: ${{ secrets.APP_STORE_CONNECT_API_ISSUER }}
        run: |
          # Create the API Key file
          mkdir -p ~/.appstoreconnect/private_keys
          echo -n "$APP_STORE_CONNECT_API_KEY_BASE64" | base64 --decode -o ~/.appstoreconnect/private_keys/AuthKey_$APP_STORE_CONNECT_API_KEY_ID.p8
          
          # Upload using xcrun altool or pilot (fastlane)
          # Using xcrun altool here as it's built-in
          xcrun altool --upload-app --type ios --file build/ios/ipa/*.ipa \
            --apiKey "$APP_STORE_CONNECT_API_KEY_ID" \
            --apiIssuer "$APP_STORE_CONNECT_API_ISSUER"

    env:
      HAS_SECRETS: ${{ secrets.P12_BASE64 != '' }}
