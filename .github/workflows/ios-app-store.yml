name: Build iOS IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      build_name:
        description: "App version, for example 0.1.1"
        required: true
        default: "0.1.1"
      build_number:
        description: "App Store build number, must increase every upload"
        required: true
        default: "2"
      upload_to_testflight:
        description: "Upload the IPA to TestFlight after building"
        type: boolean
        required: true
        default: false

env:
  BUNDLE_ID: com.yousef.ctds
  TEAM_ID: B4S7M6N5U5
  FLUTTER_CHANNEL: stable

jobs:
  build-ios:
    name: Build signed iOS IPA
    runs-on: macos-15
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Discover and Force Select Xcode 26+
        run: |
          echo "Checking available Xcode installations..."
          ls /Applications | grep Xcode || true
          
          # Find the latest Xcode 26 version
          XCODE_PATH=$(ls -d /Applications/Xcode_26*.app 2>/dev/null | sort -V | tail -n 1)
          
          if [ -z "$XCODE_PATH" ]; then
            # Fallback to default Xcode if Xcode_26 naming pattern is different
            XCODE_PATH="/Applications/Xcode.app"
          fi
          
          echo "Selecting Xcode at: $XCODE_PATH"
          sudo xcode-select -s "$XCODE_PATH/Contents/Developer"
          
          echo "Verifying SDK versions..."
          xcodebuild -version
          xcodebuild -showsdks
          
          # Check for iOS SDK (modern check)
          if ! xcodebuild -showsdks | grep -q "iphoneos"; then
            echo "::error::iOS SDK NOT FOUND."
            exit 1
          fi
          
          echo "SDK Verification Passed."

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_CHANNEL }}
          cache: false # Disable cache for a truly clean build

      - name: Full Clean Environment
        run: |
          echo "Purging all stale build artifacts..."
          flutter clean
          rm -rf build
          rm -rf ~/Library/Developer/Xcode/DerivedData
          cd ios
          rm -rf Pods Podfile.lock
          cd ..

      - name: Restore Firebase iOS config
        env:
          IOS_GOOGLE_SERVICE_INFO_PLIST_BASE64: ${{ secrets.IOS_GOOGLE_SERVICE_INFO_PLIST_BASE64 }}
        run: |
          if [ -n "$IOS_GOOGLE_SERVICE_INFO_PLIST_BASE64" ]; then
            echo "$IOS_GOOGLE_SERVICE_INFO_PLIST_BASE64" | base64 --decode > ios/Runner/GoogleService-Info.plist
          fi

      - name: Install Dependencies & CocoaPods
        run: |
          flutter pub get
          cd ios
          pod deintegrate
          pod install --repo-update
          cd ..

      - name: Validate required signing secrets
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.IOS_KEYCHAIN_PASSWORD }}
          PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          missing=0
          for name in BUILD_CERTIFICATE_BASE64 P12_PASSWORD KEYCHAIN_PASSWORD PROVISIONING_PROFILE_BASE64; do
            if [ -z "${!name}" ]; then
              echo "::error::$name is empty. Add the matching GitHub Actions secret before building a signed IPA."
              missing=1
            fi
          done
          exit "$missing"

      - name: Install Apple signing certificate
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.IOS_KEYCHAIN_PASSWORD }}
        run: |
          CERTIFICATE_PATH="$RUNNER_TEMP/distribution_certificate.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"

          echo "$BUILD_CERTIFICATE_BASE64" | base64 --decode > "$CERTIFICATE_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security default-keychain -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

      - name: Install provisioning profile
        id: profile
        env:
          PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          PROFILE_PATH="$RUNNER_TEMP/app_store.mobileprovision"
          PROFILES_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"

          mkdir -p "$PROFILES_DIR"
          echo "$PROVISIONING_PROFILE_BASE64" | base64 --decode > "$PROFILE_PATH"

          PROFILE_UUID="$(security cms -D -i "$PROFILE_PATH" | plutil -extract UUID raw -)"
          PROFILE_NAME="$(security cms -D -i "$PROFILE_PATH" | plutil -extract Name raw -)"
          cp "$PROFILE_PATH" "$PROFILES_DIR/$PROFILE_UUID.mobileprovision"

          echo "uuid=$PROFILE_UUID" >> "$GITHUB_OUTPUT"
          echo "name=$PROFILE_NAME" >> "$GITHUB_OUTPUT"



      - name: Update Xcode project with Provisioning Profile
        env:
          PROFILE_NAME: ${{ steps.profile.outputs.name }}
          TEAM_ID: ${{ env.TEAM_ID }}
        run: |
          PBXPROJ_PATH="ios/Runner.xcodeproj/project.pbxproj"
          echo "Aggressively updating $PBXPROJ_PATH with Profile: $PROFILE_NAME"
          
          # 1. Inject settings into ALL buildSettings blocks
          sed -i '' 's/buildSettings = {/buildSettings = {\n\t\t\t\tPROVISIONING_PROFILE_SPECIFIER = "'"$PROFILE_NAME"'";\n\t\t\t\tCODE_SIGN_IDENTITY = "Apple Distribution";\n\t\t\t\tCODE_SIGN_STYLE = Manual;\n\t\t\t\tProvisioningStyle = Manual;/g' "$PBXPROJ_PATH"
          
          # 2. Force DEVELOPMENT_TEAM to match our env
          sed -i '' "s/DEVELOPMENT_TEAM = [^;]*;/DEVELOPMENT_TEAM = $TEAM_ID;/g" "$PBXPROJ_PATH"
          
          # 3. Ensure ProvisioningStyle is Manual everywhere
          sed -i '' "s/ProvisioningStyle = Automatic;/ProvisioningStyle = Manual;/g" "$PBXPROJ_PATH"
          
          echo "Project updated successfully."

      - name: Create ExportOptions.plist
        env:
          PROFILE_NAME: ${{ steps.profile.outputs.name }}
          TEAM_ID: ${{ env.TEAM_ID }}
        run: |
          mkdir -p ios/Runner
          cat > ios/Runner/ExportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>teamID</key>
            <string>$TEAM_ID</string>
            <key>uploadSymbols</key>
            <true/>
            <key>uploadBitcode</key>
            <false/>
            <key>compileBitcode</key>
            <false/>
            <key>manageAppVersionAndBuildNumber</key>
            <true/>
            <key>signingStyle</key>
            <string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>${{ env.BUNDLE_ID }}</key>
              <string>$PROFILE_NAME</string>
            </dict>
          </dict>
          </plist>
          EOF
          echo "Generated ExportOptions.plist:"
          cat ios/Runner/ExportOptions.plist

      - name: Build IPA
        run: |
          # Robustly handle build name and number for push vs workflow_dispatch
          BUILD_NAME="${{ inputs.build_name }}"
          if [ -z "$BUILD_NAME" ]; then BUILD_NAME="0.1.1"; fi
          
          BUILD_NUMBER="${{ inputs.build_number }}"
          if [ -z "$BUILD_NUMBER" ]; then BUILD_NUMBER="${{ github.run_number }}"; fi
          
          echo "Building IPA with Name: $BUILD_NAME, Number: $BUILD_NUMBER"
          
          flutter build ipa \
            --release \
            --build-name "$BUILD_NAME" \
            --build-number "$BUILD_NUMBER" \
            --export-options-plist=ios/Runner/ExportOptions.plist

      - name: List Build Directory
        if: always()
        run: |
          echo "Listing build/ios/ipa contents:"
          ls -R build/ios/ipa 2>/dev/null || echo "Directory build/ios/ipa not found"
          echo "Listing build/ios contents:"
          ls -R build/ios 2>/dev/null | head -n 20 || true

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa-${{ inputs.build_name || 'push' }}-${{ github.run_number }}
          path: build/ios/ipa/
          if-no-files-found: error

      - name: Upload to TestFlight
        if: ${{ inputs.upload_to_testflight }}
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
        run: |
          mkdir -p "$RUNNER_TEMP/private_keys"
          API_KEY_PATH="$RUNNER_TEMP/private_keys/AuthKey_${APP_STORE_CONNECT_API_KEY_ID}.p8"
          echo "$APP_STORE_CONNECT_API_KEY_BASE64" | base64 --decode > "$API_KEY_PATH"

          # Find the IPA file dynamically
          IPA_PATH=$(find build/ios/ipa -name "*.ipa" | head -n 1)
          if [ -z "$IPA_PATH" ]; then
            echo "::error::No IPA file found for upload!"
            exit 1
          fi

          xcrun altool --upload-app \
            --type ios \
            --file "$IPA_PATH" \
            --apiKey "$APP_STORE_CONNECT_API_KEY_ID" \
            --apiIssuer "$APP_STORE_CONNECT_API_ISSUER_ID"
